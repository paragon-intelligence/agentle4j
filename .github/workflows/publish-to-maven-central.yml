name: Publish to Maven Central

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (e.g., v0.1.0, v1.0.0)
  workflow_dispatch:  # Allow manual triggering

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye
          
      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.SONATYPE_USERNAME}</username>
                <password>${env.SONATYPE_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
          
      - name: Build and verify
        run: mvn clean verify
        
      - name: Publish to Maven Central
        id: maven_publish
        continue-on-error: true
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mvn -B -ntp deploy -Dgpg.skip=false
          
      - name: Verify publication
        if: always()
        env:
          MAVEN_PUBLISH_OUTCOME: ${{ steps.maven_publish.outcome }}
        run: |
          GROUP_ID=$(mvn help:evaluate -Dexpression=project.groupId -q -DforceStdout)
          ARTIFACT_ID=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          GROUP_PATH=${GROUP_ID//./\/}
          POM_URL="https://repo1.maven.org/maven2/$GROUP_PATH/$ARTIFACT_ID/$VERSION/$ARTIFACT_ID-$VERSION.pom"
          PORTAL_URL="https://central.sonatype.com/artifact/$GROUP_ID/$ARTIFACT_ID/$VERSION"
          SEARCH_URL="https://search.maven.org/search?q=g:%22$GROUP_ID%22+AND+a:%22$ARTIFACT_ID%22+AND+v:%22$VERSION%22"

          echo "Publish step outcome: $MAVEN_PUBLISH_OUTCOME"
          echo "Verifying publication for $GROUP_ID:$ARTIFACT_ID:$VERSION"
          echo "Expected repo1 URL: $POM_URL"

          HTTP_CODE=""
          for attempt in {1..20}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$POM_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Artifact is available on repo1.maven.org after attempt $attempt."
              break
            fi

            echo "Artifact not visible on repo1 yet (attempt $attempt/20, HTTP $HTTP_CODE). Waiting 15s..."
            sleep 15
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Artifact never became available on repo1.maven.org."
            echo "Portal URL: $PORTAL_URL"
            exit 1
          fi

          SEARCH_RESPONSE=$(curl -s "https://search.maven.org/solrsearch/select?q=g:%22$GROUP_ID%22+AND+a:%22$ARTIFACT_ID%22+AND+v:%22$VERSION%22&rows=20&wt=json")
          SEARCH_FOUND=$(printf '%s' "$SEARCH_RESPONSE" | grep -o '"numFound":[0-9]*' | head -n1 | cut -d: -f2)

          if [ "${SEARCH_FOUND:-0}" -gt 0 ]; then
            echo "Artifact is indexed by search.maven.org."
          else
            echo "::warning::Artifact is published on repo1.maven.org, but search.maven.org has not indexed it yet."
            echo "::warning::Portal URL: $PORTAL_URL"
            echo "::warning::Search URL: $SEARCH_URL"
          fi

          if [ "$MAVEN_PUBLISH_OUTCOME" = "failure" ]; then
            echo "Publish step reported failure, but publication was verified on repo1.maven.org."
          fi
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            target/agentle4j-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
