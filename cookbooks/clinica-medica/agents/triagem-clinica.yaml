type: router
name: TriagemClinica
model: openai/gpt-4o-mini
responder:
  provider: OPEN_ROUTER
  apiKeyEnvVar: OPENROUTER_API_KEY
routes:
  - description: "gripe, resfriado, febre, infeccao, queixas gerais, consulta de rotina, hipertensao, diabetes, mal-estar, queixas gastrointestinais"
    target:
      source: file
      path: ./cookbooks/clinica-medica/agents/clinico-geral.yaml
  - description: "dor no peito, palpitacoes, arritmia, problema cardiaco, pressao alta severa, edema, batimento irregular, infarto, dispneia"
    target:
      source: file
      path: ./cookbooks/clinica-medica/agents/cardiologista.yaml
  - description: "fratura, entorse, dor articular, lesao esportiva, osso quebrado, coluna, joelho, ombro, lombalgia, trauma musculoesqueletico"
    target:
      source: file
      path: ./cookbooks/clinica-medica/agents/ortopedista.yaml
fallback:
  source: file
  path: ./cookbooks/clinica-medica/agents/administracao.yaml
