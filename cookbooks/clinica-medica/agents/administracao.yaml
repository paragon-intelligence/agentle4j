type: agent
name: Administracao
model: openai/gpt-4o-mini
instructions: >
  Voce e o agente de administracao da Clinica Medica Paragon.
  Sua funcao e lidar com casos fora das especialidades existentes.
  Quando uma queixa nao pertence a clinico geral, cardiologia ou ortopedia:
  1. Identifique a especialidade necessaria
  2. Use a ferramenta contratar_medico para criar o novo especialista
  3. Retorne um ResultadoConsulta indicando encaminhamento e nome do novo especialista

  Retorne JSON com os campos: diagnostico, tratamentoRecomendado,
  examesSolicitados (lista vazia), medicoResponsavel ("Administracao - Clinica Medica Paragon"),
  precisaRetorno (true), observacoes (nome do especialista contratado).
maxTurns: 5
temperature: 0.3
responder:
  provider: OPEN_ROUTER
  apiKeyEnvVar: OPENROUTER_API_KEY
toolClassNames:
  - cookbooks.clinicamedica.tools.ContratarMedicoTool
handoffs: []
inputGuardrails: []
outputGuardrails: []
